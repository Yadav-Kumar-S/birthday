<!DOCTYPE html>
<html>
<head>
    <title>Special Surprise</title>
</head>

<body>

<h1 align="center">🎁 Special Surprise 🎁</h1>

<p id="countdown" align="center" style="font-size:100px;">
3
</p>

<div id="surprise" align="center" style="display:none;">

    <h1>🎉 Happy Birthday Subha 🎉</h1>

    <h2>👑 My Queen 👑</h2>

    <p>
        Among billions of people in this world,
        my heart chose only one person...
        and that's YOU ❤️
    </p>

    <p>
        Happy Birthday My Queen 👑💕
    </p>

    <h2>💖 I Love You Forever 💖</h2>

</div>

<script>

let count = 3;

let timer = setInterval(function(){

    count--;

    document.getElementById("countdown").innerHTML = count;

    if(count == 0){

        clearInterval(timer);

        document.getElementById("countdown").style.display = "none";

        document.getElementById("surprise").style.display = "block";
    }

},1000);

</script>

</body>
</html>
